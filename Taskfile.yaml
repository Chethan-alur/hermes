version: '3'

vars:
  ANDROID_DEV_DIR: '/home/calur/android-dev'
  JAVA_HOME: '/home/calur/android-dev/jdk-17.0.19+10'
  ANDROID_HOME: '/home/calur/android-dev/sdk'
  ANDROID_SDK_ROOT: '/home/calur/android-dev/sdk'
  ADB: '/home/calur/android-dev/sdk/platform-tools/adb'
  GRADLE_DIST: '8.5'

env:
  JAVA_HOME: '{{.JAVA_HOME}}'
  ANDROID_HOME: '{{.ANDROID_HOME}}'
  ANDROID_SDK_ROOT: '{{.ANDROID_SDK_ROOT}}'
  PATH: '{{.JAVA_HOME}}/bin:{{.ANDROID_HOME}}/cmdline-tools/latest/bin:{{.ANDROID_HOME}}/platform-tools:{{.PATH}}'

tasks:
  default:
    desc: Setup environment, validate protocol, and build Android app
    cmds:
      - task: setup
      - task: test
      - task: android:build

  setup:
    desc: Setup local development environment and local.properties
    cmds:
      - echo "Setting up Android environment for Project Hermes..."
      - mkdir -p android
      - echo "sdk.dir={{.ANDROID_HOME}}" > android/local.properties
      - echo "✅ Environment setup complete. SDK linked to {{.ANDROID_HOME}}"

  deploy:
    desc: Dev deployment (build APK, install via ADB, launch). Installing requires USB debugging temporarily ON.
    deps: [setup, android:build]
    cmds:
      - task: android:install
      - '{{.ADB}} shell am start -n com.hermes/.MainActivity'
      - echo "App installed and launched. Runtime uses USB tethering (no ADB) - enable it on the phone and set host in windows/hermes.config.json to the tether or WireGuard IP, then run task windows-run"

  android:build:
    desc: Build the Android companion app APK
    deps: [setup]
    dir: android
    cmds:
      - chmod +x ./gradlew
      - ./gradlew assembleDebug --stacktrace
    sources:
      - 'app/src/**/*'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
    generates:
      - 'app/build/outputs/apk/debug/app-debug.apk'

  android:install:
    desc: Install debug APK onto connected Android device via ADB
    deps: [android:build]
    cmds:
      - '{{.ADB}} install -r android/app/build/outputs/apk/debug/app-debug.apk'

  android:clean:
    desc: Clean Android build artifacts
    dir: android
    cmds:
      - ./gradlew clean

  adb:forward:
    desc: (Legacy/optional) ADB port forward tcp:9999 — only if using ADB instead of USB tethering
    cmds:
      - '{{.ADB}} forward tcp:9999 tcp:9999'

  adb:status:
    desc: Check active ADB forward rules and connected devices
    cmds:
      - '{{.ADB}} devices'
      - '{{.ADB}} forward --list'

  windows:run:
    desc: Launch Windows companion application daemon in background
    cmds:
      - sh -c "nohup python3 windows/main.py > windows.log 2>&1 &"
      - echo "Hermes Windows companion running in background (log windows.log). Run task windows:stop to stop."

  windows:stop:
    desc: Stop running Windows companion application daemon
    cmds:
      - pkill -f "python3 windows/main.py" || true
      - echo "🛑 Hermes Windows companion daemon stopped."

  windows:ps:
    desc: Run the Windows companion daemon in the foreground (visible console, tray icon, for debugging)
    cmds:
      - powershell.exe -ExecutionPolicy Bypass -File windows/hermes_hotkey.ps1

  windows:install:
    desc: Install the Windows companion (copies to %LOCALAPPDATA%, auto-starts at logon, runs in tray)
    cmds:
      - powershell.exe -ExecutionPolicy Bypass -File windows/install_hermes.ps1

  windows:uninstall:
    desc: Uninstall the Windows companion (stops the tray daemon, removes shortcuts and files)
    cmds:
      - powershell.exe -ExecutionPolicy Bypass -File windows/uninstall_hermes.ps1

  windows:installer:build:
    desc: "Build packaged Setup.exe (Inno Setup 6). NOTE: run from a NATIVE Windows shell - WSL cannot launch .exe. See windows/installer/README.md"
    cmds:
      - powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "ISCC.exe windows\installer\hermes.iss"

  test:
    desc: Run protocol schema validation and unit tests
    cmds:
      - python3 .agents/skills/test-runner/scripts/run_tests.py

  test:e2e:
    desc: Run automated End-to-End integration test suite against Android phone over port 9999
    cmds:
      - python3 tests/e2e/test_end_to_end.py

  test:mode:
    desc: Run interactive Test Mode simulator and payload playback (REQ-FUNC-011)
    cmds:
      - python3 windows/test_mode.py --playback

  validate-protocol:
    desc: Validate JSON protocol payloads against schemas
    cmds:
      - python3 .agents/skills/protocol-validator/scripts/validate_protocol.py --all

  check-rtm:
    desc: Check Requirements Traceability Matrix (RTM) alignment
    cmds:
      - python3 .agents/skills/rtm-manager/scripts/check_rtm_alignment.py

  doctor:
    desc: End-to-end Hermes health check (Windows daemons, Android app, TCP reachability, config sanity)
    cmds:
      - python3 .agents/skills/hermes-doctor/scripts/hermes_doctor.py doctor {{.CLI_ARGS}}

  doctor:status:
    desc: Live runtime status of the running Hermes system (serving/transport + recent pipeline state)
    cmds:
      - python3 .agents/skills/hermes-doctor/scripts/hermes_doctor.py status {{.CLI_ARGS}}

  doctor:logs:
    desc: "Unified, timestamp-ordered log view across windows.log, windows/hermes.log and adb logcat (pass flags after --)"
    cmds:
      - python3 .agents/skills/hermes-doctor/scripts/hermes_doctor.py logs {{.CLI_ARGS}}

  doctor:probe:
    desc: Active end-to-end pipeline probe (ping->heartbeat, simulate_speech causal trace)
    cmds:
      - python3 .agents/skills/hermes-doctor/scripts/hermes_doctor.py probe --simulate {{.CLI_ARGS}}

  doctor:report:
    desc: Write a single JSON + Markdown diagnostic bundle an AI agent can read in one shot
    cmds:
      - python3 .agents/skills/hermes-doctor/scripts/hermes_doctor.py report {{.CLI_ARGS}}
